<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Jogo da Velha</title>

<style>
body {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #f4f4f4;
}

h1 {
    margin-top: 20px;
}

.tabuleiro {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    grid-gap: 5px;
    justify-content: center;
    margin-top: 20px;
}

.celula {
    width: 100px;
    height: 100px;
    background: white;
    font-size: 40px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #333;
}

.celula:hover {
    background: #ddd;
}

#mensagem {
    margin-top: 20px;
    font-size: 20px;
    font-weight: bold;
}

button {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 16px;
    cursor: pointer;
}
</style>
</head>

<body>

<h1>Jogo da Velha</h1>

<div class="tabuleiro" id="tabuleiro"></div>

<div id="mensagem"></div>

<button onclick="reiniciar()">Reiniciar</button>

<script>
let jogadorAtual = "X";
let jogoAtivo = true;
let estado = ["", "", "", "", "", "", "", "", ""];

const combinacoesVitoria = [
    [0,1,2],
    [3,4,5],
    [6,7,8],
    [0,3,6],
    [1,4,7],
    [2,5,8],
    [0,4,8],
    [2,4,6]
];

const tabuleiro = document.getElementById("tabuleiro");
const mensagem = document.getElementById("mensagem");

function criarTabuleiro() {
    tabuleiro.innerHTML = "";
    estado.forEach((valor, index) => {
        const celula = document.createElement("div");
        celula.classList.add("celula");
        celula.dataset.index = index;
        celula.innerText = valor;
        celula.addEventListener("click", clicarCelula);
        tabuleiro.appendChild(celula);
    });
}

function clicarCelula(e) {
    const index = e.target.dataset.index;

    if (estado[index] !== "" || !jogoAtivo) return;

    estado[index] = jogadorAtual;
    e.target.innerText = jogadorAtual;

    verificarVencedor();

    jogadorAtual = jogadorAtual === "X" ? "O" : "X";
}

function verificarVencedor() {
    for (let combinacao of combinacoesVitoria) {
        const [a, b, c] = combinacao;
        if (
            estado[a] &&
            estado[a] === estado[b] &&
            estado[a] === estado[c]
        ) {
            mensagem.innerText = "Jogador " + jogadorAtual + " venceu!";
            jogoAtivo = false;
            return;
        }
    }

    if (!estado.includes("")) {
        mensagem.innerText = "Empate!";
        jogoAtivo = false;
    }
}

function reiniciar() {
    estado = ["", "", "", "", "", "", "", "", ""];
    jogadorAtual = "X";
    jogoAtivo = true;
    mensagem.innerText = "";
    criarTabuleiro();
}

criarTabuleiro();
</script>

</body>
</html>
